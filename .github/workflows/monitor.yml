name: ICP Monitor

on:
  # Run every 30 minutes
  schedule:
    - cron: "*/30 * * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip3 install playwright playwright-stealth --break-system-packages --quiet
          playwright install chromium

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WATCHLIST_JSON: ${{ secrets.WATCHLIST_JSON }}
          STATE_FILE: ${{ github.workspace }}/data/state.json
        run: python3 monitor.py
